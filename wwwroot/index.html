<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Registration</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 480px; margin: 60px auto; }
    h1 { text-align: center; }
    input { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #4a90e2; color: white;
             border: none; cursor: pointer; font-size: 16px; }
    button:hover { background: #357abd; }
    #message { margin-top: 12px; padding: 10px; border-radius: 4px; }
    .success { background: #d4edda; color: #155724; }
    .error   { background: #f8d7da; color: #721c24; }
    table { width: 100%; border-collapse: collapse; margin-top: 24px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f2f2f2; }
  </style>
</head>
<body>
  <h1>Resadsd</h1>

  <input type="text"     id="name"     placeholder="Name" />
  <input type="email"    id="email"    placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />
  <button onclick="register()">Register 2.0</button>
  <div id="message"></div>

  <h2>Registered Users</h2>
  <table>
    <thead><tr><th>Name</th><th>Email</th></tr></thead>
    <tbody id="userList"></tbody>
  </table>

  <script>
    async function register() {
      const name     = document.getElementById('name').value;
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg      = document.getElementById('message');

      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });

      const data = await res.json();
      if (res.ok) {
        msg.textContent = `User "${data.name}" registered!`;
        msg.className = 'success';
        loadUsers();
      } else {
        msg.textContent = data.error;
        msg.className = 'error';
      }
    }

    async function loadUsers() {
      const res  = await fetch('/api/users');
      const list = await res.json();
      const tbody = document.getElementById('userList');
      tbody.innerHTML = list.map(u =>
        `<tr><td>${u.name}</td><td>${u.email}</td></tr>`
      ).join('');
    }

    loadUsers();
  </script>
</body>
</html>
